<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google" content="notranslate"/>
  <title>Ikigai Finder — Find Your Reason for Being</title>
  <meta name="description" content="Discover your Ikigai — the Japanese philosophy of purpose. Answer 13 guided questions and receive a personal AI analysis."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: Inter, sans-serif; background: #FDF8F3; color: #2C1810; overflow-x: hidden; min-height: 100%; }
    ::selection { background: rgba(232,98,42,.18); }

    @keyframes pFall {
      0%   { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
      8%   { opacity: .7; }
      88%  { opacity: .4; }
      100% { transform: translateY(110vh) translateX(var(--sw,40px)) rotate(360deg); opacity: 0; }
    }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse   { 0%,100% { transform:scale(.8); opacity:.35; } 50% { transform:scale(1.15); opacity:1; } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }

    /* ---------- LAYOUT ---------- */
    #app { position: relative; }
    .phase { display: none; }
    .phase.active { display: block; }

    /* ---------- NAV ---------- */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding: 14px 36px;
      background: linear-gradient(to bottom, #FDF8F3 60%, transparent);
      border-bottom: 1px solid rgba(210,180,160,.18);
    }
    .nav-logo { font-family:'Noto Serif JP',serif; font-size:1.08rem; font-weight:600; color:#2C1810; }
    .nav-logo span { color:#A08070; font-weight:300; margin-left:6px; font-size:.85rem; }
    nav select {
      background:rgba(255,255,255,.8); border:1px solid rgba(210,180,160,.35);
      color:#2C1810; padding:8px 14px; border-radius:50px; font-size:.8rem;
      cursor:pointer; font-family:Inter,sans-serif; outline:none;
    }

    /* ---------- TREES ---------- */
    .tree {
      position:fixed; bottom:0; width:clamp(140px,16vw,240px);
      pointer-events:none; z-index:1; opacity:.65;
    }
    .tree-left  { left:0; }
    .tree-right { right:0; transform:scaleX(-1); }

    /* ---------- PETALS ---------- */
    .petal {
      position:fixed; top:-20px; pointer-events:none; z-index:2;
      animation: pFall linear infinite;
    }
    .petal svg { width:100%; height:100%; display:block; }

    /* ---------- LANDING ---------- */
    #phase-landing { position:relative; z-index:10; }
    .hero-section {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:120px 24px 80px;
      background:
        radial-gradient(ellipse 65% 55% at 30% 50%, rgba(242,167,176,.2) 0%, transparent 60%),
        radial-gradient(ellipse 45% 45% at 75% 30%, rgba(244,162,97,.12) 0%, transparent 55%);
    }
    .hero-inner { text-align:center; animation:fadeUp .9s ease both; }
    .eyebrow { font-size:.7rem; letter-spacing:.22em; text-transform:uppercase; color:#E8622A; margin-bottom:16px; font-weight:500; }
    .hero-title { font-family:'Noto Serif JP',serif; font-size:clamp(2.4rem,6.5vw,5rem); font-weight:300; line-height:1.2; color:#2C1810; margin-bottom:20px; white-space:pre-line; }
    .hero-sub   { font-size:clamp(.88rem,2vw,1.05rem); color:#A08070; max-width:440px; line-height:1.8; margin:0 auto 36px; }
    .divider    { height:1px; background:linear-gradient(to right,transparent,#F2A7B0,transparent); margin:0 8%; }
    .origin-section { padding:70px 24px; display:flex; flex-direction:column; align-items:center; gap:50px; }
    .origin-label { font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:#E8622A; margin-bottom:12px; }
    .origin-title { font-family:'Noto Serif JP',serif; font-size:clamp(1.2rem,3vw,1.7rem); color:#2C1810; font-weight:400; margin-bottom:16px; }
    .origin-body  { font-size:.94rem; line-height:1.9; color:#6B4C3B; max-width:580px; text-align:center; }
    #diagram { width:min(270px,75vw); filter:drop-shadow(0 4px 16px rgba(44,24,16,.1)); }

    /* ---------- TEST ---------- */
    #phase-test {
      min-height:100vh; display:none; flex-direction:column;
      align-items:center; justify-content:center;
      padding:110px 24px 70px; position:relative; z-index:10;
    }
    #phase-test.active { display:flex; }
    .progress-wrap { width:min(540px,92vw); margin-bottom:36px; }
    .progress-top  { display:flex; justify-content:space-between; margin-bottom:8px; }
    .progress-label { font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:#A08070; }
    .progress-count { font-size:.7rem; color:#E8622A; font-weight:600; }
    .progress-bar   { height:2.5px; background:rgba(44,24,16,.08); border-radius:3px; overflow:hidden; }
    .progress-fill  { height:100%; background:linear-gradient(to right,#E8622A,#F2A7B0); border-radius:3px; transition:width .4s ease; }
    .q-card {
      width:min(540px,92vw); padding:32px 30px;
      background:rgba(255,255,255,.68); border:1px solid rgba(210,180,160,.35);
      border-radius:22px; backdrop-filter:blur(18px);
    }
    .q-hint { font-size:.7rem; text-align:center; color:#E8622A; letter-spacing:.1em; text-transform:uppercase; margin-bottom:20px; font-weight:500; }
    .q-text { font-family:'Noto Serif JP',serif; font-size:clamp(1rem,2.6vw,1.3rem); font-weight:400; line-height:1.65; color:#2C1810; text-align:center; margin-bottom:16px; }
    .q-nav  { display:flex; gap:11px; margin-top:22px; }

    textarea {
      width:100%; min-height:120px; background:rgba(255,255,255,.65);
      border:1.5px solid rgba(210,180,160,.35); border-radius:14px;
      padding:14px 17px; color:#2C1810; font-family:Inter,sans-serif;
      font-size:.93rem; line-height:1.75; resize:vertical; outline:none;
      transition:border-color .2s; display:block;
    }
    textarea:focus { border-color:#E8622A; }

    .opts { display:flex; flex-wrap:wrap; gap:9px; margin-top:8px; }
    .opt-btn {
      padding:9px 17px; border-radius:50px; cursor:pointer;
      border:1.5px solid rgba(210,180,160,.35);
      background:rgba(255,255,255,.55); color:#6B4C3B;
      font-size:.84rem; font-family:Inter,sans-serif;
      transition:all .15s; font-weight:400;
    }
    .opt-btn.selected {
      border-color:#E8622A; background:rgba(232,98,42,.09);
      color:#E8622A; font-weight:600;
    }

    input[type=range] {
      -webkit-appearance:none; appearance:none;
      width:100%; height:3px; border-radius:3px;
      background:rgba(44,24,16,.1); cursor:pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
      background:#E8622A; cursor:pointer; border:3px solid white;
      box-shadow:0 2px 8px rgba(232,98,42,.28);
    }
    .scale-wrap { margin-top:20px; padding:0 4px; }
    .scale-labels { display:flex; justify-content:space-between; margin-top:10px; align-items:center; }
    .scale-lo, .scale-hi { font-size:.77rem; color:#A08070; }
    .scale-val { font-size:1.4rem; font-weight:700; color:#E8622A; font-family:'Noto Serif JP',serif; }

    /* ---------- RESULT ---------- */
    #phase-result {
      min-height:100vh; display:none; flex-direction:column;
      align-items:center; padding:110px 24px 90px;
      position:relative; z-index:10;
    }
    #phase-result.active { display:flex; }
    .result-eyebrow { font-size:.68rem; letter-spacing:.22em; text-transform:uppercase; color:#E8622A; margin-bottom:8px; }
    .result-title   { font-family:'Noto Serif JP',serif; font-size:clamp(1.7rem,4.5vw,2.4rem); font-weight:300; color:#2C1810; margin-bottom:40px; text-align:center; }
    .result-cards   { max-width:700px; width:100%; }

    .r-card {
      border-radius:18px; padding:22px 24px; margin-bottom:14px;
      background:rgba(255,255,255,.68); border:1px solid rgba(210,180,160,.35);
    }
    .r-card.highlight {
      background:linear-gradient(135deg,rgba(232,98,42,.07),rgba(242,167,176,.1));
      border-color:#F2A7B0;
    }
    .r-card-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .r-card-icon { font-size:1.15rem; }
    .r-card-heading { font-family:'Noto Serif JP',serif; font-size:.95rem; font-weight:600; color:#2C1810; }
    .r-card.highlight .r-card-heading { color:#E8622A; }
    .r-card-short { font-size:.91rem; line-height:1.82; color:#6B4C3B; }
    .r-card-long  { font-size:.89rem; line-height:1.82; color:#A08070; margin-top:8px; display:none; }
    .r-card-long.open { display:block; }
    .r-card-toggle { background:none; border:none; color:#E8622A; cursor:pointer; font-size:.8rem; font-weight:600; padding:0; margin-top:4px; font-family:Inter,sans-serif; }

    .loader { background:rgba(255,255,255,.68); border:1px solid rgba(210,180,160,.35); border-radius:22px; padding:52px 36px; text-align:center; max-width:700px; width:100%; }
    .loader-dots { display:flex; gap:8px; justify-content:center; margin-bottom:18px; }
    .loader-dot  { width:9px; height:9px; border-radius:50%; background:#E8622A; }
    .loader-dot:nth-child(1) { animation:pulse 1.1s 0s ease infinite; }
    .loader-dot:nth-child(2) { animation:pulse 1.1s .18s ease infinite; }
    .loader-dot:nth-child(3) { animation:pulse 1.1s .36s ease infinite; }
    .loader-text { color:#A08070; font-size:.88rem; }

    /* ---------- PAYWALL ---------- */
    #paywall { max-width:520px; text-align:center; margin-top:60px; width:100%; display:none; }
    #paywall.active { display:block; }
    #result-content { display:none; flex-direction:column; align-items:center; width:100%; }
    .pay-title { font-family:'Noto Serif JP',serif; font-size:clamp(1.6rem,4vw,2.2rem); font-weight:300; color:#2C1810; margin-bottom:20px; }
    .pay-sub   { font-size:.92rem; line-height:1.8; color:#6B4C3B; margin-bottom:32px; }
    .pay-lock  { font-size:.75rem; color:#A08070; margin-top:16px; }

    /* ---------- REVIEWS ---------- */
    #reviews-section { max-width:700px; width:100%; margin-top:60px; }
    .reviews-divider { height:1px; background:linear-gradient(to right,transparent,#F2A7B0,transparent); margin-bottom:60px; }
    .reviews-title-wrap { text-align:center; margin-bottom:36px; }
    .reviews-label { font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:#E8622A; margin-bottom:10px; }
    .reviews-title { font-family:'Noto Serif JP',serif; font-size:clamp(1.2rem,3vw,1.7rem); color:#2C1810; font-weight:400; margin-bottom:8px; }
    .reviews-sub   { color:#A08070; font-size:.88rem; }
    .review-form { background:rgba(255,255,255,.65); border:1px solid rgba(210,180,160,.35); border-radius:20px; padding:24px 26px; margin-bottom:24px; }
    .stars { display:flex; gap:3px; cursor:pointer; }
    .star  { font-size:22px; color:#D4B8A8; transition:color .1s; line-height:1; user-select:none; }
    .star.lit { color:#E8622A; }
    .review-name { width:100%; padding:12px 17px; background:rgba(255,255,255,.65); border:1.5px solid rgba(210,180,160,.35); border-radius:12px; color:#2C1810; font-family:Inter,sans-serif; font-size:.9rem; outline:none; margin:12px 0 10px; display:block; }
    .review-list { display:flex; flex-direction:column; gap:14px; }
    .review-card { background:rgba(255,255,255,.58); border:1px solid rgba(210,180,160,.35); border-radius:18px; padding:20px 22px; }
    .review-author { font-weight:600; color:#2C1810; font-size:.9rem; margin-bottom:3px; }
    .review-text { color:#6B4C3B; font-size:.88rem; line-height:1.75; font-style:italic; margin:10px 0 12px; }
    .reply-list { margin-bottom:8px; }
    .reply-item { border-left:2px solid #F2A7B0; padding-left:14px; margin-left:8px; margin-bottom:8px; }
    .reply-author { font-weight:600; font-size:.8rem; color:#6B4C3B; margin-bottom:2px; }
    .reply-text   { font-size:.84rem; color:#A08070; line-height:1.65; }
    .reply-form { margin-top:10px; }
    .reply-name { width:100%; padding:9px 14px; background:rgba(255,255,255,.65); border:1.5px solid rgba(210,180,160,.35); border-radius:12px; color:#2C1810; font-family:Inter,sans-serif; font-size:.83rem; outline:none; margin-bottom:8px; display:block; }
    .reply-btns { display:flex; gap:8px; margin-top:8px; }
    .reply-toggle { background:none; border:none; color:#E8622A; cursor:pointer; font-size:.8rem; font-weight:600; padding:0; font-family:Inter,sans-serif; }

    /* ---------- BUTTONS ---------- */
    .btn-p {
      display:inline-flex; align-items:center; gap:8px;
      background:linear-gradient(135deg,#E8622A,#C0452B);
      color:white; border:none; padding:14px 38px; border-radius:50px;
      font-size:.93rem; font-weight:600; letter-spacing:.04em;
      cursor:pointer; font-family:Inter,sans-serif;
      box-shadow:0 6px 24px rgba(232,98,42,.3); transition:all .2s;
    }
    .btn-p:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(232,98,42,.38); }
    .btn-g {
      background:transparent; border:1.5px solid rgba(210,180,160,.35);
      color:#6B4C3B; padding:12px 24px; border-radius:50px;
      font-size:.87rem; cursor:pointer; font-family:Inter,sans-serif; transition:all .2s;
    }
    .btn-g:hover { border-color:#E8622A; color:#E8622A; }

    /* ---------- RESULT NAV BUTTONS ---------- */
    #result-actions { max-width:700px; width:100%; margin-top:20px; display:flex; justify-content:center; gap:10px; }

    /* ---------- SCROLLBAR ---------- */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:rgba(44,24,16,.1); border-radius:4px; }

    /* ---------- PRINT ---------- */
    @media print {
      nav, #no-print, .no-print, #result-actions, .tree, .petal, #reviews-section, #btn-restart { display:none !important; }
      body, #app { background:#fff !important; }
      .result-cards { max-width:100% !important; }
      #result-content { padding:0 !important; }
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    }
    @page { margin:1.5cm; }
  </style>
</head>
<body>
<div id="app">

      <p style="font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#E8622A;margin-bottom:12px">SETUP</p>

      <input type="password" id="apikey-input" placeholder="sk-ant-..." style="width:100%;padding:12px 16px;border:1.5px solid rgba(210,180,160,.5);border-radius:12px;font-family:Inter,sans-serif;font-size:.9rem;outline:none;margin-bottom:12px;color:#2C1810;background:white"/>

  <!-- RESULT -->
  <div id="phase-result" class="phase">

function buildDiagram() {
  const ns='http://www.w3.org/2000/svg';
  const svg=document.getElementById('diagram');
  svg.innerHTML='';
  const tl=t();
  const circles=[{cx:118,cy:118,color:'#E8622A'},{cx:182,cy:118,color:'#9B6B9E'},{cx:118,cy:182,color:'#4A8FA8'},{cx:182,cy:182,color:'#C9934A'}];
  const offsets=[{dx:0,dy:-14},{dx:14,dy:-14},{dx:0,dy:17},{dx:-14,dy:17}];
  const inter=[{x:150,y:96},{x:212,y:150},{x:150,y:204},{x:88,y:150}];

  const defs=document.createElementNS(ns,'defs');
  circles.forEach((c,i)=>{
    const g=document.createElementNS(ns,'radialGradient');
    g.setAttribute('id',`dg${i}`);g.setAttribute('cx','50%');g.setAttribute('cy','50%');g.setAttribute('r','50%');
    const s1=document.createElementNS(ns,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',c.color);s1.setAttribute('stop-opacity','0.42');
    const s2=document.createElementNS(ns,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',c.color);s2.setAttribute('stop-opacity','0.07');
    g.appendChild(s1);g.appendChild(s2);defs.appendChild(g);
  });
  svg.appendChild(defs);

  circles.forEach((c,i)=>{
    const el=document.createElementNS(ns,'circle');
    el.setAttribute('cx',c.cx);el.setAttribute('cy',c.cy);el.setAttribute('r','78');
    el.setAttribute('fill',`url(#dg${i})`);el.setAttribute('stroke',c.color);el.setAttribute('stroke-width','1.2');el.setAttribute('stroke-opacity','0.5');
    svg.appendChild(el);
  });

  const center=document.createElementNS(ns,'circle');
  center.setAttribute('cx','150');center.setAttribute('cy','150');center.setAttribute('r','30');
  center.setAttribute('fill','rgba(255,255,255,0.8)');center.setAttribute('stroke','#F2A7B0');center.setAttribute('stroke-width','1.2');
  svg.appendChild(center);

  const addText=(x,y,txt,sz,color,weight,spacing)=>{
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('text-anchor','middle');
    t.setAttribute('fill',color);t.setAttribute('font-size',sz);t.setAttribute('font-family','Noto Serif JP,serif');
    if(weight)t.setAttribute('font-weight',weight);
    if(spacing)t.setAttribute('letter-spacing',spacing);
    t.textContent=txt;svg.appendChild(t);
  };
  addText(150,147,tl.center,'7','#2C1810','600','1');
  addText(150,159,'生き甲斐','8','#6B4C3B');

  function wrapText(s,max=9){const ws=s.split(' ');const ls=[];let cur='';ws.forEach(w=>{if((cur+' '+w).trim().length>max){ls.push(cur.trim());cur=w;}else cur=(cur+' '+w).trim();});if(cur)ls.push(cur);return ls;}

  inter.forEach((p,i)=>{
    const ls=wrapText(tl.inter[i],8);
    ls.forEach((ln,li)=>{
      const tx=document.createElementNS(ns,'text');
      tx.setAttribute('x',p.x);tx.setAttribute('y',p.y+li*8-(ls.length-1)*4);
      tx.setAttribute('text-anchor','middle');tx.setAttribute('fill','#2C1810');tx.setAttribute('font-size','6.2');
      tx.setAttribute('font-family','Inter,sans-serif');tx.setAttribute('font-weight','600');tx.setAttribute('opacity','0.72');
      tx.textContent=ln;svg.appendChild(tx);
    });
  });

  circles.forEach((c,i)=>{
    const ls=wrapText(tl.circles[i],10);
    ls.forEach((ln,li)=>{
      const tx=document.createElementNS(ns,'text');
      tx.setAttribute('x',c.cx+offsets[i].dx);tx.setAttribute('y',c.cy+offsets[i].dy+li*8-(ls.length-1)*4);
      tx.setAttribute('text-anchor','middle');tx.setAttribute('fill','#6B4C3B');tx.setAttribute('font-size','5.8');
      tx.setAttribute('font-family','Inter,sans-serif');
      tx.textContent=ln;svg.appendChild(tx);
    });
  });
}

function renderQuestion() {
  const tl=t();
  const qs=tl.questions;
  const q=qs[qi];
  const total=qs.length;

  document.getElementById('txt-q-count').textContent=`${qi+1} / ${total}`;
  document.getElementById('progress-fill').style.width=`${(qi/total)*100}%`;
  document.getElementById('txt-q-hint').textContent=tl.q_hint;

  const body=document.getElementById('q-body');
  body.innerHTML='';

  const qp=document.createElement('p');
  qp.className='q-text';
  qp.textContent=q.q;
  body.appendChild(qp);

  if(q.type==='open'){
    const ta=document.createElement('textarea');
    ta.placeholder=tl.q_ph;
    ta.rows=5;
    ta.value=answers[qi]||'';
    ta.addEventListener('input',e=>{ answers[qi]=e.target.value; });
    body.appendChild(ta);
  }

  if(q.type==='multi'){
    const div=document.createElement('div');
    div.className='opts';
    const sel=Array.isArray(answers[qi])?answers[qi].filter(x=>q.opts.includes(x)):[];
    const customVal=Array.isArray(answers[qi])?answers[qi].find(x=>!q.opts.includes(x))||'':'';

    q.opts.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='opt-btn'+(sel.includes(opt)?' selected':'');
      btn.textContent=opt;
      btn.addEventListener('click',()=>{
        let cur=(answers[qi]||[]).filter(x=>x!=='');
        if(cur.includes(opt)) cur=cur.filter(x=>x!==opt);
        else cur=[...cur,opt];
        answers[qi]=cur;
        btn.classList.toggle('selected',cur.includes(opt));
      });
      div.appendChild(btn);
    });

    if(q.other){
      const otherInput=document.createElement('input');
      otherInput.type='text';
      otherInput.placeholder=t().other_ph||'Something else…';
      otherInput.value=customVal;
      otherInput.style.cssText='width:100%;margin-top:10px;padding:9px 14px;background:rgba(255,255,255,.65);border:1.5px solid rgba(210,180,160,.35);border-radius:12px;color:#2C1810;font-family:Inter,sans-serif;font-size:.84rem;outline:none;display:block;';
      otherInput.addEventListener('input',e=>{
        const val=e.target.value.trim();
        let cur=(answers[qi]||[]).filter(x=>q.opts.includes(x));
        if(val) cur=[...cur,val];
        answers[qi]=cur;
      });
      div.appendChild(otherInput);
    }
    body.appendChild(div);
  }

  if(q.type==='scale'){
    currentScale=answers[qi]??5;
    const wrap=document.createElement('div');
    wrap.className='scale-wrap';
    const input=document.createElement('input');
    input.type='range';input.min=1;input.max=10;input.value=currentScale;
    const labels=document.createElement('div');
    labels.className='scale-labels';
    const lo=document.createElement('span');lo.className='scale-lo';lo.textContent=q.lo;
    const val=document.createElement('span');val.className='scale-val';val.textContent=currentScale;
    const hi=document.createElement('span');hi.className='scale-hi';hi.textContent=q.hi;
    labels.appendChild(lo);labels.appendChild(val);labels.appendChild(hi);
    input.addEventListener('input',e=>{
      currentScale=Number(e.target.value);
      answers[qi]=currentScale;
      val.textContent=currentScale;
    });
    wrap.appendChild(input);wrap.appendChild(labels);
    body.appendChild(wrap);
  }

  // Nav buttons
  const nav=document.getElementById('q-nav');
  nav.innerHTML='';
  if(qi>0){
    const prev=document.createElement('button');
    prev.className='btn-g';prev.textContent=tl.q_prev;
    prev.addEventListener('click',()=>{ if(qi>0){qi--;renderQuestion();} });
    nav.appendChild(prev);
  }
  const next=document.createElement('button');
  next.className='btn-p';
  next.textContent=qi===total-1?tl.q_submit:tl.q_next;
  next.addEventListener('click',()=>{
    if(q.type==='scale') answers[qi]=currentScale;
    if(qi<total-1){ qi++; renderQuestion(); }
    else submitAll();
  });
  nav.appendChild(next);
}

  document.getElementById('result-actions').style.display='none';
  document.getElementById('reviews-section').style.display='none';

  const qa=qs.map((q,i)=>{

    return `Q${i+1} [${q.type}]: ${q.q}\nA: ${Array.isArray(a)?a.join(', '):(a??'—')}`;
  }).join('\n\n');

  const [s0,s1,s2,s3,s4,s5,s6,s7,s8]=tl.sh;
  const sys=`${tl.lang_instr}

You are a perceptive psychologist analyzing someone based on 16 answers they gave about their life. You write with depth, warmth, and flawless grammar.

WRITE IN THEIR LANGUAGE. If they answered in Dutch, write in perfect Dutch. Flawless grammar, natural phrasing, the way an educated native speaker writes. Never translate literally — write originally in their language.

YOUR GOAL: Make them feel deeply understood. Each insight should land — either confirming something they feel, or revealing something they hadn't put into words.

HOW TO WRITE:
- Depth over surface. Don't say "you like freedom." Explain what their need for freedom reveals about how they're built and where it leads.
- Connect their answers. Find the thread running through what they told you and show it to them.
- Concrete, never vague. Avoid empty words like "journey," "authentic," "alignment." Every sentence means something real.
- Warm but honest. You're on their side, but you tell the truth.
- Full, complete sentences. Never cut off mid-thought. Proper grammar always.

THE MOST IMPORTANT RULE — BE SPECIFIC, NEVER GENERIC:
Every sentence must be impossible to copy-paste onto a stranger. If a sentence could describe half the population, DELETE it and rewrite it using the specific things THIS person told you.

BANNED (too generic — never write things like this):
- "You are someone who values growth and authenticity."
- "You have a deep desire to make an impact."
- "You are driven and ambitious."
- "You care about freedom and meaning."
These are worthless. They fit anyone.

REQUIRED (specific — tied to their actual answers):
- "You'd rather build your own company than climb someone else's ladder — and the fact that admin work and taking orders drain you confirms it: you need to be the one calling the shots."
- "You light up around people and ideas, but repetitive routine quietly kills you. That combination points somewhere specific: you're built for work that's social, fast, and never the same twice."

Take their real answers. Name the actual things they said they love, hate, want, and fear. Build every insight from THOSE specifics. The more precisely you reflect their exact answers back to them in a new light, the more it lands.

CRITICAL OUTPUT FORMAT:
- Write EXACTLY 5 blocks of text, separated by a line containing only "---"
- Do NOT write any titles, headers, labels, or section names. No "Section 1", no "Who you are:", nothing. Just the insight text itself.
- Each block is 3-4 complete, flowing sentences. Rich and specific.

NEVER START A BLOCK WITH A FORMULA. Do not begin with phrases like "There's something striking about how you...", "What stands out about you...", "It's clear that...", "You're the kind of person who...". These openings are dead. Every block must start differently and dive straight into the real observation. Vary your sentence structure completely between blocks — some short and punchy, some longer. Surprise them.

The 5 blocks, in this order (but never label them):

1. Who they are at their core — one deep truth about their character.
2. What they truly want from life — what they're really reaching for underneath.
3. Their real strengths — 2-3 things they're naturally good at, and why these matter.
4. What to watch out for — one honest pattern that could hold them back, framed as growth.
5. People they resemble — 2-3 real, well-known people wired like them, and what their paths suggest.

Remember: no labels, no titles. Just five rich paragraphs separated by ---. Perfect grammar in their language.`;

  try {
    const res=await fetch('/.netlify/functions/analyse',{
      method:'POST',
      headers:{ 'Content-Type':'application/json' },

      p.appendChild(rest);
      
      const btn=document.createElement('button');
      btn.style.cssText='background:none; border:none; color:'+m.color+'; cursor:pointer; font-size:0.88rem; font-weight:600; padding:0; margin-top:12px; font-family:Inter, sans-serif; display:block;';
      btn.textContent=(moreTxt[L]||moreTxt.en)+' →';
      btn.addEventListener('click',()=>{
        const open=rest.style.display!=='none';
        rest.style.display=open?'none':'inline';
        btn.textContent=open?(moreTxt[L]||moreTxt.en)+' →':(lessTxt[L]||lessTxt.en);
      });
      textWrap.appendChild(btn);
    }
    
    card.appendChild(textWrap);
    cards.appendChild(card);
  });

  // Show PDF button and reviews now that result is rendered
  const actions=document.getElementById('result-actions');
  if(actions) actions.style.display='flex';
  const reviews=document.getElementById('reviews-section');
  if(reviews) reviews.style.display='block';
}

// ─────────────────────────────────────────────────────────────────────────────
// REVIEWS
// ─────────────────────────────────────────────────────────────────────────────
function renderStars(container, val, onSet) {
  container.innerHTML='';
  for(let n=1;n<=5;n++){
    const s=document.createElement('span');
    s.className='star'+(n<=val?' lit':'');
    s.textContent='★';
    if(onSet) s.addEventListener('click',()=>onSet(n));
    container.appendChild(s);
  }
}

function renderReviews() {
  const tl=t();
  const list=document.getElementById('review-list');
  list.innerHTML='';
  reviews.forEach(r=>{
    const card=document.createElement('div');card.className='review-card';

    const author=document.createElement('p');author.className='review-author';author.textContent=r.name;
    const stars=document.createElement('div');stars.className='stars';
    renderStars(stars,r.stars,null);
    const txt=document.createElement('p');txt.className='review-text';txt.textContent=`"${r.text}"`;
    card.appendChild(author);card.appendChild(stars);card.appendChild(txt);

    if(r.replies.length){
      const rl=document.createElement('div');rl.className='reply-list';
      r.replies.forEach(rp=>{
        const ri=document.createElement('div');ri.className='reply-item';
        const rn=document.createElement('p');rn.className='reply-author';rn.textContent=rp.name;
        const rt=document.createElement('p');rt.className='reply-text';rt.textContent=rp.text;
        ri.appendChild(rn);ri.appendChild(rt);rl.appendChild(ri);
      });
      card.appendChild(rl);
    }

    const replyToggle=document.createElement('button');replyToggle.className='reply-toggle';replyToggle.textContent=tl.rev_reply;
    const replyForm=document.createElement('div');replyForm.className='reply-form';replyForm.style.display='none';
    const rName=document.createElement('input');rName.type='text';rName.className='reply-name';rName.placeholder=tl.rev_reply_name;
    const rText=document.createElement('textarea');rText.placeholder=tl.rev_reply_ph;rText.rows=2;rText.style.minHeight='60px';rText.style.fontSize='.84rem';
    const rBtns=document.createElement('div');rBtns.className='reply-btns';
    const rPost=document.createElement('button');rPost.className='btn-p';rPost.style.cssText='padding:9px 20px;font-size:.82rem';rPost.textContent=tl.rev_post_reply;
    const rCancel=document.createElement('button');rCancel.className='btn-g';rCancel.style.cssText='padding:9px 16px;font-size:.82rem';rCancel.textContent='×';
    rBtns.appendChild(rPost);rBtns.appendChild(rCancel);
    replyForm.appendChild(rName);replyForm.appendChild(rText);replyForm.appendChild(rBtns);
    card.appendChild(replyToggle);card.appendChild(replyForm);

    replyToggle.addEventListener('click',()=>{ replyForm.style.display='block'; replyToggle.style.display='none'; });
    rCancel.addEventListener('click',()=>{ replyForm.style.display='none'; replyToggle.style.display=''; });
    rPost.addEventListener('click',()=>{
      const txt=rText.value.trim(); if(!txt)return;
      r.replies.push({name:rName.value.trim()||'Anonymous',text:txt});
      renderReviews();
    });

    list.appendChild(card);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click',()=>{
  qi=0; answers={}; showPhase('test'); renderQuestion();
});

document.getElementById('lang-select').addEventListener('change',e=>{
  lang=e.target.value;
  renderTranslations();
  buildDiagram();
  // Re-render current question if we're in the test phase
  if(document.getElementById('phase-test').classList.contains('active')){
    renderQuestion();
  }
  // Re-render result card labels if we're on the results page
  if(lastResultText && document.getElementById('result-content').style.display!=='none'){
    renderResult(lastResultText);
  }
});

document.getElementById('btn-pay').addEventListener('click',()=>{
  // Save answers + lang RIGHT BEFORE redirecting to Stripe — double safety.
  try {
    localStorage.setItem('ikigai_answers', JSON.stringify(answers));
    localStorage.setItem('ikigai_lang', lang);
    localStorage.setItem('ikigai_saved_at', String(Date.now()));
    sessionStorage.setItem('ikigai_answers', JSON.stringify(answers));
    sessionStorage.setItem('ikigai_lang', lang);
  } catch(e){}
  window.location.href = STRIPE_LINK;
});

document.getElementById('btn-print').addEventListener('click',()=>{
  // Find jsPDF wherever it loaded
  const JSPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF || (window.jspdf);
  if(!lastResultText || !JSPDF){
    // Fallback: browser print dialog (works everywhere)
    window.print();
    return;
  }
  try {
    const doc = new JSPDF({unit:'pt', format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 56;
    const maxW = pageW - margin*2;
    let y = margin;

    const tl=t();
    const L = lang || 'en';
    const labels=[
      {nl:'Wie je bent', en:'Who you are', fr:'Qui tu es', de:'Wer du bist', es:'Quién eres'},
      {nl:'Wat je wilt', en:'What you want', fr:'Ce que tu veux', de:'Was du willst', es:'Lo que quieres'},
      {nl:'Sterke punten', en:'Your strengths', fr:'Tes forces', de:'Deine Stärken', es:'Tus fortalezas'},
      {nl:'Let hierop', en:'Watch out', fr:'Attention', de:'Achtung', es:'Cuidado'},
      {nl:'Voorbeelden', en:'Examples', fr:'Exemples', de:'Beispiele', es:'Ejemplos'}
    ];

    // Title
    doc.setFont('times','italic');
    doc.setFontSize(13);
    doc.setTextColor(180,100,60);
    doc.text('Ikigai Finder', margin, y);
    y += 26;
    doc.setFont('times','bold');
    doc.setFontSize(22);
    doc.setTextColor(44,24,16);
    doc.text(tl.r_title || 'Your Ikigai', margin, y);
    y += 30;

    const sections=lastResultText.split('---').map(s=>s.trim()).filter(s=>s.length>0);
    sections.forEach((insight,i)=>{
      if(i>=5)return;
      const label=(labels[i]&&(labels[i][L]||labels[i].en))||'';
      // space check
      if(y > pageH - margin - 60){ doc.addPage(); y = margin; }
      // label
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.setTextColor(200,80,40);
      doc.text(label.toUpperCase(), margin, y);
      y += 16;
      // body
      doc.setFont('times','normal');
      doc.setFontSize(11.5);
      doc.setTextColor(51,41,31);
      const lines = doc.splitTextToSize(insight, maxW);
      lines.forEach(line=>{
        if(y > pageH - margin){ doc.addPage(); y = margin; }
        doc.text(line, margin, y);
        y += 16;
      });
      y += 18;
    });

    doc.save('ikigai-analysis.pdf');
  } catch(e){
    // Fallback to browser print
    window.print();
  }
});

document.getElementById('btn-restart').addEventListener('click',()=>{
  qi=0; answers={};
  // Clear saved answers — starting fresh
  try {
    localStorage.removeItem('ikigai_answers');
    localStorage.removeItem('ikigai_lang');
    localStorage.removeItem('ikigai_saved_at');
    sessionStorage.removeItem('ikigai_answers');
    sessionStorage.removeItem('ikigai_lang');
  } catch(e){}
  // Remove ?paid=true from the URL so a refresh doesn't re-trigger the paid flow
  if(window.history && window.history.replaceState){
    window.history.replaceState({}, '', window.location.pathname);
  }
  paid=false;
  showPhase('landing');
});

// Form stars
const formStarsEl=document.getElementById('form-stars');
function updateFormStars(){
  renderStars(formStarsEl, formStars, n=>{ formStars=n; updateFormStars(); });
}
updateFormStars();

document.getElementById('btn-submit-review').addEventListener('click',()=>{
  const txt=document.getElementById('form-text').value.trim();
  if(!txt)return;
  const name=document.getElementById('form-name').value.trim()||'Anonymous';
  reviews.unshift({name,stars:formStars,text:txt,replies:[]});
  document.getElementById('form-text').value='';
  document.getElementById('form-name').value='';
  formStars=5;
  updateFormStars();
  const btn=document.getElementById('btn-submit-review');
  const orig=btn.textContent; btn.textContent='✓';
  setTimeout(()=>btn.textContent=orig,2500);
  renderReviews();
});

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('lang-select').value=lang;
renderTranslations();
buildDiagram();

// If returning from Stripe with ?paid=true, restore answers and generate result
if(paid){
  // Read from localStorage first, fall back to sessionStorage (for older saves)
  let savedAnswers = null, savedLang = null;
  try {
    savedAnswers = localStorage.getItem('ikigai_answers') || sessionStorage.getItem('ikigai_answers');
    savedLang    = localStorage.getItem('ikigai_lang')    || sessionStorage.getItem('ikigai_lang');
  } catch(e){}

  if(savedLang && LANG[savedLang]) {
    lang = savedLang;
    document.getElementById('lang-select').value = lang;
    renderTranslations();
  }

  // Check the saved answers actually contain real content (not empty {})
  let parsed = null;
  if(savedAnswers){
    try { parsed = JSON.parse(savedAnswers); } catch(e){}
  }
  const hasRealAnswers = parsed && typeof parsed==='object' && Object.keys(parsed).length > 0;

  if(hasRealAnswers){
    answers = parsed;
    // Keep saved answers in storage so a refresh/retry still works.
    submitAll(); // go straight to AI analysis, skips paywall because paid=true
  } else {
    // Answers were lost (storage cleared, different browser, in-app browser, etc.)
    // Show a recovery message instead of silently restarting at question 1.
    showPhase('result');
    document.getElementById('paywall').classList.remove('active');
    document.getElementById('result-content').style.display='flex';
    const cards=document.getElementById('result-cards');
    const actions=document.getElementById('result-actions');
    if(actions) actions.style.display='none';
    const reviews=document.getElementById('reviews-section');
    if(reviews) reviews.style.display='none';
    const recoveryMsg={
      nl:'Je betaling is gelukt! Maar je antwoorden konden niet worden teruggevonden (waarschijnlijk omdat de betaling in een andere browser werd geopend). Geen zorgen — vul de test nog één keer in en je analyse verschijnt direct, zonder opnieuw te betalen.',
      en:'Your payment went through! But we couldn\u2019t find your answers (probably because the payment opened in a different browser). No worries — just fill in the test once more and your analysis will appear right away, with no second payment.',
      fr:'Ton paiement a r\u00e9ussi ! Mais nous n\u2019avons pas retrouv\u00e9 tes r\u00e9ponses (probablement parce que le paiement s\u2019est ouvert dans un autre navigateur). Pas d\u2019inqui\u00e9tude \u2014 refais le test une fois et ton analyse appara\u00eetra aussit\u00f4t, sans payer \u00e0 nouveau.',
      de:'Deine Zahlung war erfolgreich! Aber wir konnten deine Antworten nicht finden (wahrscheinlich, weil die Zahlung in einem anderen Browser ge\u00f6ffnet wurde). Keine Sorge \u2014 f\u00fclle den Test einfach noch einmal aus und deine Analyse erscheint sofort, ohne erneut zu bezahlen.',
      es:'\u00a1Tu pago se realiz\u00f3 correctamente! Pero no pudimos encontrar tus respuestas (probablemente porque el pago se abri\u00f3 en otro navegador). No te preocupes: vuelve a hacer el test una vez y tu an\u00e1lisis aparecer\u00e1 de inmediato, sin pagar otra vez.'
    };
    const cont={nl:'Test invullen',en:'Take the test',fr:'Faire le test',de:'Test ausf\u00fcllen',es:'Hacer el test'};
    const L=lang||'en';
    cards.innerHTML='';
    const box=document.createElement('div');
    box.style.cssText='padding:32px; text-align:center; background:#FFF8F0; border:1px solid #EFE0D0; border-radius:14px; max-width:560px; margin:0 auto;';
    const p=document.createElement('p');
    p.style.cssText='font-size:1.02rem; line-height:1.75; color:#5a4634; margin:0 0 22px; font-family:Georgia,serif;';
    p.textContent=recoveryMsg[L]||recoveryMsg.en;
    box.appendChild(p);
    const btn=document.createElement('button');
    btn.className='btn-p';
    btn.style.cssText='padding:13px 30px; font-size:.92rem;';
    btn.textContent=cont[L]||cont.en;
    btn.addEventListener('click',()=>{
      // Mark as paid in storage so after the test they skip the paywall
      try { localStorage.setItem('ikigai_prepaid','true'); } catch(e){}
      qi=0; answers={};
      showPhase('test');
      renderQuestion();
    });
    box.appendChild(btn);
    cards.appendChild(box);
  }
}
</script>
</body>
</html>
